<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORA Connect - Grand Traverse County AI Assistant</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        .markdown-content p { margin: 0.5rem 0; }
        .markdown-content ul, .markdown-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .markdown-content li { margin: 0.25rem 0; }
        .markdown-content strong { font-weight: 600; }
        .feedback-buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; opacity: 0.7; transition: opacity 0.2s; }
        .feedback-buttons:hover { opacity: 1; }
        .feedback-btn { background: none; border: 1px solid #e5e7eb; border-radius: 0.375rem; padding: 0.25rem 0.5rem; cursor: pointer; font-size: 1.125rem; transition: all 0.2s; }
        .feedback-btn:hover { background: #f3f4f6; transform: scale(1.1); }
        .feedback-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .help-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .help-content { background: white; border-radius: 0.5rem; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .sample-prompt { background: #f3f4f6; padding: 0.75rem; border-radius: 0.375rem; margin: 0.5rem 0; cursor: pointer; transition: background 0.2s; }
        .sample-prompt:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_ENDPOINT = 'https://x75hhzcm3d.execute-api.us-gov-east-1.amazonaws.com/prod/query';
        const FEEDBACK_ENDPOINT = 'https://x75hhzcm3d.execute-api.us-gov-east-1.amazonaws.com/prod/feedback';

        function CoraChat() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(scrollToBottom, [messages]);

            const samplePrompts = [
                "What is Project Alpha?",
                "When is the next Board of Commissioners meeting?",
                "How do I pay property taxes?",
                "How do I register to vote?",
                "What services does the Health Department provide?",
                "Tell me about parks and recreation programs"
            ];

            const sendFeedback = async (messageIndex, sentiment) => {
                const message = messages[messageIndex];
                if (!message || message.role !== 'assistant') return;

                try {
                    const response = await fetch(FEEDBACK_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: messages[messageIndex - 1]?.content || '',
                            response: message.content,
                            sentiment: sentiment,
                            sources: message.sources || [],
                            responseTime: message.responseTime || 0
                        })
                    });

                    if (response.ok) {
                        // Update message to show feedback was recorded
                        setMessages(prev => prev.map((msg, idx) => 
                            idx === messageIndex 
                                ? { ...msg, feedbackGiven: sentiment }
                                : msg
                        ));
                    }
                } catch (error) {
                    console.error('Feedback error:', error);
                }
            };

            const sendMessage = async (text = input) => {
                if (!text.trim() || isLoading) return;

                const userMessage = { role: 'user', content: text };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);

                const startTime = Date.now();

                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: text })
                    });

                    const data = await response.json();
                    const responseTime = Date.now() - startTime;

                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: data.answer,
                        sources: data.sources || [],
                        responseTime: responseTime
                    }]);
                } catch (error) {
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: 'Sorry, I encountered an error. Please try again.',
                        error: true
                    }]);
                }

                setIsLoading(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const HelpModal = () => (
                <div className="help-modal" onClick={() => setShowHelp(false)}>
                    <div className="help-content" onClick={(e) => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-gray-800">Help & Sample Prompts</h2>
                            <button 
                                onClick={() => setShowHelp(false)}
                                className="text-gray-500 hover:text-gray-700 text-2xl"
                            >×</button>
                        </div>
                        
                        <div className="mb-6">
                            <h3 className="font-semibold text-gray-700 mb-2">What is CORA Connect?</h3>
                            <p className="text-gray-600">
                                CORA Connect is Grand Traverse County's AI assistant, powered by AWS and Claude. 
                                Ask questions about county services, meetings, departments, and more!
                            </p>
                        </div>

                        <div className="mb-4">
                            <h3 className="font-semibold text-gray-700 mb-2">Try These Questions:</h3>
                            {samplePrompts.map((prompt, idx) => (
                                <div
                                    key={idx}
                                    className="sample-prompt"
                                    onClick={() => {
                                        setShowHelp(false);
                                        sendMessage(prompt);
                                    }}
                                >
                                    {prompt}
                                </div>
                            ))}
                        </div>

                        <div className="mt-6 text-sm text-gray-500">
                            <p>💡 <strong>Tip:</strong> Ask specific questions for best results!</p>
                            <p>👍👎 Please provide feedback on responses to help us improve.</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-blue-600 text-white p-4 shadow-lg">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">CORA Connect</h1>
                                <p className="text-sm text-blue-100">Grand Traverse County AI Assistant</p>
                            </div>
                            <button
                                onClick={() => setShowHelp(true)}
                                className="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded-lg font-semibold transition"
                            >
                                ? Help
                            </button>
                        </div>
                    </div>

                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto p-4">
                        <div className="max-w-4xl mx-auto space-y-4">
                            {messages.length === 0 && (
                                <div className="text-center py-12">
                                    <h2 className="text-xl font-semibold text-gray-700 mb-4">
                                        Welcome to CORA Connect!
                                    </h2>
                                    <p className="text-gray-600 mb-6">
                                        Ask me anything about Grand Traverse County services, meetings, or departments.
                                    </p>
                                    <button
                                        onClick={() => setShowHelp(true)}
                                        className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
                                    >
                                        View Sample Questions
                                    </button>
                                </div>
                            )}

                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-3xl ${msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white'} rounded-lg p-4 shadow`}>
                                        <div className="markdown-content whitespace-pre-wrap">
                                            {msg.content}
                                        </div>
                                        
                                        {msg.sources && msg.sources.length > 0 && (
                                            <div className="mt-3 pt-3 border-t border-gray-200 text-sm text-gray-600">
                                                <strong>Sources:</strong>
                                                <ul className="mt-1 space-y-1">
                                                    {msg.sources.map((source, i) => (
                                                        <li key={i}>• {source}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        {msg.role === 'assistant' && !msg.error && (
                                            <div className="feedback-buttons">
                                                <button
                                                    className={`feedback-btn ${msg.feedbackGiven === 'positive' ? 'active' : ''}`}
                                                    onClick={() => sendFeedback(idx, 'positive')}
                                                    title="Helpful response"
                                                >
                                                    👍
                                                </button>
                                                <button
                                                    className={`feedback-btn ${msg.feedbackGiven === 'negative' ? 'active' : ''}`}
                                                    onClick={() => sendFeedback(idx, 'negative')}
                                                    title="Not helpful"
                                                >
                                                    👎
                                                </button>
                                                {msg.feedbackGiven && (
                                                    <span className="text-xs text-gray-500 self-center ml-2">
                                                        Thanks for your feedback!
                                                    </span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}

                            {isLoading && (
                                <div className="flex justify-start">
                                    <div className="bg-white rounded-lg p-4 shadow">
                                        <div className="flex space-x-2">
                                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                                            <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div ref={messagesEndRef} />
                        </div>
                    </div>

                    {/* Input */}
                    <div className="bg-white border-t border-gray-200 p-4">
                        <div className="max-w-4xl mx-auto flex gap-2">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder="Ask about county services, meetings, departments..."
                                className="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                disabled={isLoading}
                            />
                            <button
                                onClick={() => sendMessage()}
                                disabled={isLoading || !input.trim()}
                                className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition font-semibold"
                            >
                                Send
                            </button>
                        </div>
                        <div className="max-w-4xl mx-auto mt-2 text-xs text-center text-gray-500">
                            Powered by AWS GovCloud + Claude Sonnet 4.5
                        </div>
                    </div>

                    {showHelp && <HelpModal />}
                </div>
            );
        }

        ReactDOM.render(<CoraChat />, document.getElementById('root'));
    </script>
</body>
</html>
ENDOFFILE
