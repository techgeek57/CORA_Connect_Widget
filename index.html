<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORA Connect - Grand Traverse County AI Assistant</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .message-content { white-space: pre-wrap; }
    .message-content h1 { font-size: 1.25rem; font-weight: 700; margin: 0.5rem 0; }
    .message-content h2 { font-size: 1.1rem; font-weight: 600; margin: 0.4rem 0; }
    .message-content p { margin: 0.5rem 0; }
    .message-content ul, .message-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    const API_ENDPOINT = 'https://x75hhzcm3d.execute-api.us-gov-east-1.amazonaws.com/prod/query';
    const FEEDBACK_ENDPOINT = 'https://x75hhzcm3d.execute-api.us-gov-east-1.amazonaws.com/prod/feedback';

    function FeedbackModal({ isOpen, onClose, onSubmit }) {
      const [selectedReason, setSelectedReason] = useState('');
      const [comment, setComment] = useState('');

      const reasons = [
        "Didn't answer my question",
        "Information was incorrect",
        "Response was incomplete",
        "Sources weren't helpful",
        "Other"
      ];

      const handleSubmit = () => {
        onSubmit(selectedReason, comment);
        setSelectedReason('');
        setComment('');
        onClose();
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-lg p-6 max-w-md w-full mx-4" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-semibold mb-4">Help us improve</h3>
            <p className="text-sm text-gray-600 mb-4">What went wrong with this response?</p>
            
            <div className="space-y-2 mb-4">
              {reasons.map((reason) => (
                <label key={reason} className="flex items-center space-x-2 cursor-pointer">
                  <input
                    type="radio"
                    name="reason"
                    value={reason}
                    checked={selectedReason === reason}
                    onChange={(e) => setSelectedReason(e.target.value)}
                    className="w-4 h-4"
                  />
                  <span className="text-sm">{reason}</span>
                </label>
              ))}
            </div>

            <textarea
              value={comment}
              onChange={(e) => setComment(e.target.value)}
              placeholder="Additional comments (optional)"
              className="w-full border border-gray-300 rounded p-2 text-sm mb-4"
              rows="3"
            />

            <div className="flex gap-2 justify-end">
              <button
                onClick={onClose}
                className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded"
              >
                Cancel
              </button>
              <button
                onClick={handleSubmit}
                disabled={!selectedReason}
                className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed"
              >
                Submit Feedback
              </button>
            </div>
          </div>
        </div>
      );
    }

    function ChatWidget() {
      const [messages, setMessages] = useState([
        {
          role: 'assistant',
          content: "Hi! I'm CORA Connect, Grand Traverse County's AI assistant. I can help you find information about county services, meetings, projects, and more. What would you like to know?",
          sources: [],
          messageId: Date.now()
        }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [feedbackModalOpen, setFeedbackModalOpen] = useState(false);
      const [selectedMessageIndex, setSelectedMessageIndex] = useState(null);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const sendMessage = async () => {
        if (!input.trim() || loading) return;

        const userMessage = { role: 'user', content: input, messageId: Date.now() };
        const queryText = input;
        const startTime = Date.now();
        
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setLoading(true);

        try {
          const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: queryText })
          });

          const data = await response.json();
          const responseTime = Date.now() - startTime;
          
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: data.answer,
            sources: data.sources || [],
            messageId: Date.now(),
            query: queryText,
            responseTime: responseTime,
            feedbackGiven: false
          }]);
        } catch (error) {
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: 'Sorry, I encountered an error processing your request. Please try again.',
            sources: [],
            messageId: Date.now()
          }]);
        } finally {
          setLoading(false);
        }
      };

      const submitFeedback = async (messageIndex, sentiment, reason = '', comment = '') => {
        const message = messages[messageIndex];
        
        try {
          const feedbackData = {
            query: message.query,
            response: message.content,
            sentiment: sentiment,
            sources: message.sources,
            response_time_ms: message.responseTime
          };

          if (reason) feedbackData.feedback_reason = reason;
          if (comment) feedbackData.feedback_comment = comment;

          await fetch(FEEDBACK_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(feedbackData)
          });

          // Mark feedback as given
          setMessages(prev => prev.map((msg, idx) => 
            idx === messageIndex ? { ...msg, feedbackGiven: true, selectedFeedback: sentiment } : msg
          ));
        } catch (error) {
          console.error('Failed to submit feedback:', error);
        }
      };

      const handleNegativeFeedback = (messageIndex) => {
        setSelectedMessageIndex(messageIndex);
        setFeedbackModalOpen(true);
      };

      const handleModalSubmit = (reason, comment) => {
        submitFeedback(selectedMessageIndex, 'negative', reason, comment);
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <div className="flex flex-col h-screen bg-gray-50">
          <FeedbackModal 
            isOpen={feedbackModalOpen}
            onClose={() => setFeedbackModalOpen(false)}
            onSubmit={handleModalSubmit}
          />

          {/* Header */}
          <div className="bg-blue-600 text-white p-4 shadow-lg">
            <div className="max-w-4xl mx-auto">
              <h1 className="text-2xl font-bold">CORA Connect</h1>
              <p className="text-blue-100 text-sm">Grand Traverse County AI Assistant</p>
            </div>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-4">
            <div className="max-w-4xl mx-auto space-y-4">
              {messages.map((msg, idx) => (
                <div key={msg.messageId} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-3xl rounded-lg p-4 ${
                    msg.role === 'user' 
                      ? 'bg-blue-600 text-white' 
                      : 'bg-white shadow-md border border-gray-200'
                  }`}>
                    <div className="message-content">{msg.content}</div>
                    
                    {msg.sources && msg.sources.length > 0 && (
                      <div className="mt-3 pt-3 border-t border-gray-200">
                        <p className="text-xs font-semibold text-gray-500 mb-2">Sources:</p>
                        <div className="space-y-1">
                          {msg.sources.map((source, sidx) => (
                            <div key={sidx} className="text-xs text-gray-600">
                              • {source.title} ({source.department})
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Feedback Buttons */}
                    {msg.role === 'assistant' && msg.query && (
                      <div className="mt-3 pt-3 border-t border-gray-200 flex gap-2">
                        <button
                          onClick={() => submitFeedback(idx, 'positive')}
                          disabled={msg.feedbackGiven}
                          className={`px-3 py-1 rounded text-sm transition-colors ${
                            msg.selectedFeedback === 'positive'
                              ? 'bg-green-100 text-green-700 border border-green-300'
                              : 'bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300'
                          } ${msg.feedbackGiven ? 'cursor-not-allowed opacity-60' : ''}`}
                        >
                          👍 Helpful
                        </button>
                        <button
                          onClick={() => handleNegativeFeedback(idx)}
                          disabled={msg.feedbackGiven}
                          className={`px-3 py-1 rounded text-sm transition-colors ${
                            msg.selectedFeedback === 'negative'
                              ? 'bg-red-100 text-red-700 border border-red-300'
                              : 'bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300'
                          } ${msg.feedbackGiven ? 'cursor-not-allowed opacity-60' : ''}`}
                        >
                          👎 Not helpful
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              ))}
              
              {loading && (
                <div className="flex justify-start">
                  <div className="bg-white rounded-lg p-4 shadow-md border border-gray-200">
                    <div className="flex space-x-2">
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                    </div>
                  </div>
                </div>
              )}
              
              <div ref={messagesEndRef} />
            </div>
          </div>

          {/* Input */}
          <div className="border-t border-gray-300 bg-white p-4">
            <div className="max-w-4xl mx-auto flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={handleKeyPress}
                placeholder="Ask about county services, meetings, projects..."
                disabled={loading}
                className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 disabled:bg-gray-100"
              />
              <button
                onClick={sendMessage}
                disabled={loading || !input.trim()}
                className="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
              >
                Send
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChatWidget />);
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
