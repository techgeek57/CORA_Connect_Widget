<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORA Connect - Grand Traverse County AI Assistant</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .message-content { white-space: pre-wrap; }
    .message-content h1 { font-size: 1.25rem; font-weight: 700; margin: 0.5rem 0; }
    .message-content h2 { font-size: 1.1rem; font-weight: 600; margin: 0.4rem 0; }
    .message-content p { margin: 0.5rem 0; }
    .message-content ul, .message-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .help-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .help-content { background: white; border-radius: 0.5rem; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .sample-prompt { background: #f3f4f6; padding: 0.75rem; border-radius: 0.375rem; margin: 0.5rem 0; cursor: pointer; transition: background 0.2s; }
    .sample-prompt:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    const API_ENDPOINT = 'https://x75hhzcm3d.execute-api.us-gov-east-1.amazonaws.com/prod/query';

    function ChatWidget() {
      const [messages, setMessages] = useState([
        {
          role: 'assistant',
          content: "Hi! I'm CORA Connect, Grand Traverse County's AI assistant. I can help you find information about county services, meetings, projects, and more. What would you like to know?",
          sources: []
        }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [showHelp, setShowHelp] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const samplePrompts = [
        "What is Project Alpha?",
        "When is the next Board of Commissioners meeting?",
        "How do I pay property taxes?",
        "How do I register to vote?",
        "What services does the Health Department provide?",
        "Tell me about parks and recreation programs"
      ];

      const sendMessage = async (text = input) => {
        if (!text.trim() || loading) return;

        const userMessage = { role: 'user', content: text };
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setLoading(true);

        try {
          const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: text })
          });

          const data = await response.json();
          
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: data.answer,
            sources: data.sources || []
          }]);
        } catch (error) {
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: 'Sorry, I encountered an error processing your request. Please try again.',
            sources: []
          }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const HelpModal = () => (
        <div className="help-modal" onClick={() => setShowHelp(false)}>
          <div className="help-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-2xl font-bold text-gray-800">Help & Sample Prompts</h2>
              <button 
                onClick={() => setShowHelp(false)}
                className="text-gray-500 hover:text-gray-700 text-2xl"
              >×</button>
            </div>
            
            <div className="mb-6">
              <h3 className="font-semibold text-gray-700 mb-2">What is CORA Connect?</h3>
              <p className="text-gray-600">
                CORA Connect is Grand Traverse County's AI assistant, powered by AWS and Claude. 
                Ask questions about county services, meetings, departments, and more!
              </p>
            </div>

            <div className="mb-4">
              <h3 className="font-semibold text-gray-700 mb-2">Try These Questions:</h3>
              {samplePrompts.map((prompt, idx) => (
                <div
                  key={idx}
                  className="sample-prompt"
                  onClick={() => {
                    setShowHelp(false);
                    sendMessage(prompt);
                  }}
                >
                  {prompt}
                </div>
              ))}
            </div>

            <div className="mt-6 text-sm text-gray-500">
              <p>💡 <strong>Tip:</strong> Ask specific questions for best results!</p>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col h-screen bg-gray-50">
          {/* Header */}
          <div className="bg-blue-600 text-white p-4 shadow-lg">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold">CORA Connect</h1>
                <p className="text-blue-100 text-sm">Grand Traverse County AI Assistant</p>
              </div>
              <button
                onClick={() => setShowHelp(true)}
                className="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded-lg font-semibold transition"
              >
                ? Help
              </button>
            </div>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-4">
            <div className="max-w-4xl mx-auto space-y-4">
              {messages.map((msg, idx) => (
                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-3xl rounded-lg p-4 ${
                    msg.role === 'user' 
                      ? 'bg-blue-600 text-white' 
                      : 'bg-white shadow-md border border-gray-200'
                  }`}>
                    <div className="message-content">{msg.content}</div>
                    
                    {msg.sources && msg.sources.length > 0 && (
                      <div className="mt-3 pt-3 border-t border-gray-200">
                        <p className="text-xs font-semibold text-gray-500 mb-2">Sources:</p>
                        <div className="space-y-1">
                          {msg.sources.map((source, sidx) => (
                            <div key={sidx} className="text-xs text-gray-600">
                              • {source.title} ({source.department})
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ))}
              
              {loading && (
                <div className="flex justify-start">
                  <div className="bg-white rounded-lg p-4 shadow-md border border-gray-200">
                    <div className="flex space-x-2">
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                      <div className="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                    </div>
                  </div>
                </div>
              )}
              
              <div ref={messagesEndRef} />
            </div>
          </div>

          {/* Input */}
          <div className="border-t border-gray-300 bg-white p-4">
            <div className="max-w-4xl mx-auto flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={handleKeyPress}
                placeholder="Ask about county services, meetings, projects..."
                disabled={loading}
                className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 disabled:bg-gray-100"
              />
              <button
                onClick={() => sendMessage()}
                disabled={loading || !input.trim()}
                className="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
              >
                Send
              </button>
            </div>
            <div className="max-w-4xl mx-auto mt-2 text-xs text-center text-gray-500">
              Powered by AWS GovCloud + Claude Sonnet 4.5
            </div>
          </div>

          {showHelp && <HelpModal />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChatWidget />);
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
